version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: maslul
      POSTGRES_USER: maslul
      POSTGRES_PASSWORD: maslul_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=maslul.settings.dev
      - DATABASE_URL=postgresql://maslul:maslul_dev@db:5432/maslul
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

  celery_worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    command: celery -A maslul worker --loglevel=info
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=maslul.settings.dev
      - DATABASE_URL=postgresql://maslul:maslul_dev@db:5432/maslul
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

  celery_beat:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    command: celery -A maslul beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=maslul.settings.dev
      - DATABASE_URL=postgresql://maslul:maslul_dev@db:5432/maslul
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app

  tor:
    image: osminogin/tor-simple
    restart: unless-stopped

  scraper_worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.scrapers
    command: celery -A scrapers.celery_app worker --loglevel=info -Q scrapers
    env_file:
      - ../.env
    environment:
      - BACKEND_API_URL=http://backend:8000/api
      - REDIS_URL=redis://redis:6379/0
      - PROXY_URL=socks5h://tor:9050
    depends_on:
      - redis
      - backend
      - tor
    volumes:
      - ../scrapers:/app/scrapers

  backup:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backup
    environment:
      - DB_HOST=db
      - DB_USER=maslul
      - DB_NAME=maslul
      - BACKUP_KEEP=10
    depends_on:
      - db
    volumes:
      - ../backups:/backups
    restart: unless-stopped

volumes:
  postgres_data:
